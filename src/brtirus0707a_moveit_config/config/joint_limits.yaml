robot_description_planning:
  # Position bounds here are the CONTROLLER SOFT LIMITS (calibration.SOFT_LIMITS_DEG,
  # from the factory commissioning log), mapped into URDF radians via the sign/offset
  # map and kept ~0.5 deg inside the bridge's accept window. This makes MoveIt plan
  # only poses the motion_bridge will accept -- otherwise it plans within the wider
  # URDF mechanical limits and the bridge rejects the result at execution time
  # ("rejecting (soft-limit): J4=... not in [...]"). Keep these in sync with
  # SOFT_LIMITS_DEG if the soft limits change.
  #
  # Acceleration limits are conservative defaults (~= velocity, i.e. ~1 s to max
  # speed) only so MoveIt's time-optimal trajectory generation is defined; the
  # HC1 does the real accel/decel profiling for AddRCC moves, so these affect the
  # planned timestamps / RViz preview, not the physical motion.
  joint_limits:
