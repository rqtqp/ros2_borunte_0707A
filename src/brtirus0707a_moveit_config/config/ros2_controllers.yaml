controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    brtirus0707a_controller:
      type: joint_trajectory_controller/JointTrajectoryController

brtirus0707a_controller:
  ros__parameters:
    joints:
      - brtirus0707a_joint_1
      - brtirus0707a_joint_2
      - brtirus0707a_joint_3
      - brtirus0707a_joint_4
      - brtirus0707a_joint_5
      - brtirus0707a_joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true
    # Tolerances set wide so the controller does not abort when Isaac Sim
    # lags behind the commanded trajectory during physics settling
    constraints:
      stopped_velocity_tolerance: 0.0
      goal_time: 0.0
      brtirus0707a_joint_1: { trajectory: 0.0, goal: 0.0 }
      brtirus0707a_joint_2: { trajectory: 0.0, goal: 0.0 }
      brtirus0707a_joint_3: { trajectory: 0.0, goal: 0.0 }
      brtirus0707a_joint_4: { trajectory: 0.0, goal: 0.0 }
      brtirus0707a_joint_5: { trajectory: 0.0, goal: 0.0 }
      brtirus0707a_joint_6: { trajectory: 0.0, goal: 0.0 }
